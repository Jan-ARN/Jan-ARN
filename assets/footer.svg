<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 170" width="1200" height="170" role="img" aria-label="the same ridgeline, now at night">
  <defs>
    <!-- night sky: the dusk has deepened -->
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0B141C"/>
      <stop offset="0.6" stop-color="#101F2A"/>
      <stop offset="1"   stop-color="#1A3142"/>
    </linearGradient>
    <radialGradient id="beaconGlowF" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F0C880" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frameF"><rect width="1200" height="170"/></clipPath>
  </defs>

  <g clip-path="url(#frameF)">
    <rect width="1200" height="170" fill="url(#night)"/>

    <!-- denser stars than dusk -->
    <g fill="#DCE6EE">
      <circle cx="120" cy="28" r="1.1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="4.5s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="44" r="0.9" opacity="0.5"/>
      <circle cx="420" cy="24" r="1.0" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="52" r="0.8" opacity="0.45"/>
      <circle cx="700" cy="30" r="1.1" opacity="0.75"><animate attributeName="opacity" values="0.75;0.25;0.75" dur="5.2s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="48" r="0.9" opacity="0.5"/>
      <circle cx="980" cy="26" r="1.0" opacity="0.65"><animate attributeName="opacity" values="0.65;0.2;0.65" dur="4.8s" repeatCount="indefinite"/></circle>
      <circle cx="1100" cy="50" r="0.9" opacity="0.5"/>
      <circle cx="340" cy="66" r="0.7" opacity="0.4"/>
      <circle cx="640" cy="70" r="0.7" opacity="0.4"/>
    </g>

    <!-- same ridge silhouettes as the hero, read as the closing shot -->
    <path d="M0,118 L220,82 L420,116 L620,76 L840,114 L1040,84 L1200,112 L1200,170 L0,170 Z"
          fill="#1A3142" opacity="0.9"/>
    <path d="M0,170 L0,140 L160,108 L340,146 L520,104 L720,144 L920,106 L1120,142 L1200,124 L1200,170 Z"
          fill="#0E1C26"/>

    <!-- beacon, still on watch -->
    <g transform="translate(720,86)">
      <circle r="18" fill="url(#beaconGlowF)">
        <animate attributeName="r" values="11;22;11" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.4" fill="#F0C880"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/></circle>
    </g>

    <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#5E7C90" letter-spacing="3">STILL ON CALL</text>
  </g>
</svg>
