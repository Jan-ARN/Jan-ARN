    <!-- centered minimal divider -->
    <line x1="430" y1="60" x2="585" y2="60" stroke="#A9C5D6" stroke-width="1.5" opacity="0.4"/>
    <circle cx="600" cy="60" r="5" fill="#C79A5E"/>
    <line x1="615" y1="60" x2="770" y2="60" stroke="#A9C5D6" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
