<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="footer">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#476A82"/>
      <stop offset="0.45" stop-color="#2F4D63"/>
      <stop offset="1" stop-color="#1C3445"/>
    </linearGradient>
    <clipPath id="fframe"><rect width="1200" height="120"/></clipPath>
  </defs>

  <g clip-path="url(#fframe)">
