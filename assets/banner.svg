<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Jan Arnemann — Front-End Developer at ilert">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C3445"/>
      <stop offset="0.55" stop-color="#2F4D63"/>
      <stop offset="1" stop-color="#476A82"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9FBBCD" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9FBBCD" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame"><rect width="1200" height="240" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="240" fill="url(#bg)"/>

    <!-- slow drifting halo for subtle depth -->
    <g>
      <ellipse cx="0" cy="0" rx="360" ry="360" fill="url(#halo)" opacity="0.6"/>
      <animateTransform attributeName="transform" type="translate" values="940 30; 1010 70; 940 30" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </g>

    <!-- accent bar -->
    <rect x="82" y="92" width="60" height="5" rx="2.5" fill="#C79A5E"/>

    <!-- text -->
    <text x="80" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#F3ECDB" letter-spacing="0.4">Jan Arnemann</text>
    <text x="82" y="188" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#A9C5D6" letter-spacing="2.2">FRONT-END DEVELOPER · ILERT</text>
  </g>
</svg>
